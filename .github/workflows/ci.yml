name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on:
  push:

jobs:
  Explore-GitHub-Actions:
    runs-on: [self-hosted, build]
    container:
      image: localhost/base:latest
    steps:
      - run: echo "🎉 The job was triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on ${{ runner.os }}"
      - run: echo "🔎 Branch is ${{ github.ref }} and repo is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}    # branch that triggered the workflow
          fetch-depth: 1            # only latest commit ✅
      - run: echo "💡 The ${{ github.repository }} repository has been cloned."
      - name: List files in the repository
        run: ls ${{ github.workspace }}
      - run: echo "🍏 This job's status is ${{ job.status }}."